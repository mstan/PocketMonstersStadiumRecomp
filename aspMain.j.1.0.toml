text_offset = 0
# Synthetic IMEM layout generated by tools/build_aspmain_combined.py:
#   - rspboot: ROM[0x5D8C0..0x5D940), loaded into IMEM[0..0x80)
#   - aspMain: ROM[0x5ED20..0x5FD20), loaded into IMEM[0x80..0x1080)
#
# The submitted PMS audio task advertises ucode_boot_size=0xD0, but rspboot
# itself DMAs aspMain to SP_MEM_ADDR=0x1080 (IMEM offset 0x80). Treating all
# 0xD0 bytes as boot text would shift aspMain branch targets by 0x50.
text_size = 0x1080
text_address = 0x04001000
rom_file_path = "aspmain_combined.bin"
output_file_path = "rsp/aspMain.cpp"
output_function_name = "aspMain"

# Live PMS task ucode_data begins with the same audio command dispatch table
# used by Pokemon Stadium US:
#   0x10EC 0x139C 0x119C 0x1A64 0x11C8 0x17EC 0x1208 0x0000
#   0x0000 0x127C 0x1348 0x1248 0x1C84 0x12D4 0x02B0 0x1384
#
# These entries are read from DMEM data and reached through jr, so RSPRecomp
# needs them declared explicitly.
extra_indirect_branch_targets = [
    0x10EC, 0x139C, 0x119C, 0x1A64, 0x11C8, 0x17EC, 0x1208, 0x127C,
    0x1348, 0x1248, 0x1C84, 0x12D4, 0x12B0, 0x1384,
    0x10A0,
    0x1144,
]
