[output]
collision_policy = "suffix"

# ── Patches ────────────────────────────────────────────────────────────────
[patches]
# libleo 64DD bootdisk descramble — IDENTIFIED, confidence HIGH.
#
# FUN_800095cc is libleo's __LeoBootGame2 (the scrambled 64DD bootstrap),
# NOT game copy protection. FUN_80009490 immediately preceding it is
# LeoBootGame: it derives key = (sum of the 4 bytes of __LeoBootGame2's
# address) & 0xFF, descrambles the blob in place (ptr[2]-=key; ptr[3]+=key
# over 0x324 bytes, then __LeoBootGame3 for 0x60), then jal's the now-
# decrypted __LeoBootGame2. The ROM bytes are SCRAMBLED — not valid MIPS
# until that routine runs — which static recompilation cannot execute (we
# run compiled C, not RDRAM bytes). Stubbing __LeoBootGame2 lets generation
# complete; this is a genuine self-modifying-code boundary, not a
# recompiler bug being papered over.
#
# Evidence (vs PokemonStadiumRecomp/disasm/src/libleo/bootdisk.c, which has
# the real descrambled source — PSR keeps the same bytes scrambled in-ROM):
#   - FUN_80009490 size = 0x13C, exactly matching `bzero(LeoBootGame, 0x13C)`.
#   - FUN_800095cc sits at 0x80009490 + 0x13C — i.e. the function LeoBootGame
#     descrambles (bootdisk.c: `ptr = (u8*)&__LeoBootGame2`).
#   - byte-identical descramble algorithm (address-sum key; -key/+key pairs).
#   - PSR Makefile note: "this file is encrypted we cant have splat decrypt it".
# PMS was a 64DD-era title (alleged Disk Drive addon), so this live bootdisk
# path is genuine residue, not libultra boilerplate.
#
# NOT on the cart-boot path: LeoBootGame is reached only via the dead
# STATE_N64DD_BOOT_UNUSED case of the Game_Thread state machine (nothing
# sets that state on first boot). So this stub is SAFE and is NOT the
# black-screen cause: the REAL copy protection (Game_DoCopyProtection,
# PSR 0x80028FA0) passes — PMS ROM @0xE38 is byte-identical to PSR's
# magic 0x828A — and even on failure its switch `default` still renders the
# N64 logo, never a black screen. Full analysis: FINDINGS.md (CP-001).
stubs = [
    "FUN_800095cc",
]

[[patches.hook]]
func = "FUN_80001c50"
before_vram = 0x80001C50
text = "recomp_register_runtime_fragment(rdram, ctx->r4, (int32_t)ctx->r5);"

[[patches.hook]]
func = "FUN_80001f8c"
before_vram = 0x80001F8C
text = "recomp_unregister_runtime_fragment((uint32_t)ctx->r4);"

[[patches.hook]]
func = "FUN_80016c70"
before_vram = 0x80016D00
text = "pms_diag_script_dispatch(rdram, ctx);"
