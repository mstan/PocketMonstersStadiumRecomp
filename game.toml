# game.toml — Pocket Monsters Stadium (J)
#
# N64Recomp configuration, ROM-DIRECT (symbols-file) mode — no pret ELF.
# Unlike PokemonStadiumRecomp (which consumes pret's post-build ELF),
# this project has no decompilation. We feed N64Recomp the raw ROM plus
# a symbols file (sections + per-function vram/size) generated from
# Ghidra's auto-analysis (tools/gen_symbols_toml.py).
#
# NO STUBS. If recompilation hits a code path it can't handle, fix the
# engine — never paper over.

[input]
# Resident .text loads at vram 0x80000400 (ROM offset 0x1000). The cart
# header entrypoint field (0x80100400) is decorative for this game (same
# quirk as Pokemon Stadium 1); the real entry stub is at 0x80000400 and
# bzero's BSS at 0x80080000 then jr's to Main at 0x80000550. The runtime
# maps the resident section onto 0x80000400 from ROM 0x1000, so the
# entrypoint must match that section's ram_addr.
entrypoint = 0x80000400

# Byteswapped (.v64) original converted to native big-endian .z64 by the
# project setup. md5 of the .z64 = c46e087d966a35095df96799b0b4ffae.
rom_file_path = "baserom.z64"

# Sections + functions, generated from Ghidra auto-analysis. In symbols
# mode N64Recomp reads function words straight from rom_file_path using
# each section's rom/vram and each function's vram/size — no ELF.
symbols_file_path = "symbols.toml"

# Output directory for generated C — gitignored.
output_func_path = "generated"

# One C file per function group (fast incremental builds).
single_file_output = false
functions_per_output_file = 32

# Keep trace hooks off for the first bring-up — less codegen noise while
# we validate the symbol set. Flip on once boot is being debugged.
trace_mode = true

# Authoritative function-entry seeds for decompressed fragments — the engine
# CFG walk can't reach indirect jalr / data-table function pointers, so an
# entry only reached that way misses get_function at runtime. Each VRAM here
# that lands inside a decompressed section becomes a dispatch alias (interior)
# or a standalone function (gap). This is the sink the runtime capture/
# fold-back loop appends to (ISSUES #1 / CRASH-001). Populate from the runtime
# capture manifest (which reports the exact fragment + offset + call form) —
# naive crash-address guesses do NOT map cleanly (synthetic per-variant link
# addrs; some miss addrs are relocated pointer VALUES, not code entries).
force_function_vrams = [


    # Normally EMPTY: the universal jal-return dispatch-label pass in
    # N64Recomp decompressed.cpp makes every interior return point resumable,
    # and the librecomp lookup-miss self-heal dispatches into the resident
    # enclosing function — so interior-return misses (e.g. the captured
    # CRASH-001 0x8212D600 inside func_8212D504, and 0x82173CEC) no longer
    # need per-address seeding. Seed here only for true gap/standalone
    # entries the runtime self-heal can't reach (none known yet).
    #
    # GB-mode operator-dispatcher leaves (func_81103C40). This dispatcher
    # (a GB-CPU microop applier) selects one of FOUR tiny leaf operators by
    # a2 in {0,1,2,else} via lui s3,0x8110; addiu s3, 0x3BB4/0x3BD0/0x3BEC/
    # 0x3C34, then `jalr s3` in a loop. They are reached ONLY by that computed
    # jalr — never a direct jal — so static CFG discovery never carved them
    # into functions: the enclosing func_811030F0 ends at 0x81103BB0 (jr ra +
    # delay slot) and 0x81103BB4..0x81103C3C was an unclaimed gap. Without
    # these, get_function(<runtime base>+0x3BB4) misses -> lookup-miss
    # trampoline no-op -> the operator never runs -> GB-init stalls (the
    # high-pri kickoff threads t0/t2/t5 park on queues nothing sends to) =
    # GB-mode softlock. LINK vrams (NOT the runtime miss 0x80121EB4) so they
    # become standalone recompiled leaf functions in section 1.
    0x81103BB4,  # GB op-dispatch leaf (a2==0 / default)
    0x81103BD0,  # GB op-dispatch leaf (a2==1)
    0x81103BEC,  # GB op-dispatch leaf (a2==2)
    0x81103C34,  # GB op-dispatch leaf (a2==else)
    # Round 2: more GB-section (section 1) indirect-only entries surfaced by
    # the runtime capture once the op-dispatch leaves above let GB-init run
    # further. These are GB-CPU handler functions reached via computed jalr /
    # opcode tables (no direct jal), captured as "code-entry" misses
    # (build/coverage/runtime_captures.json). LINK vrams = section-1 link base
    # 0x81100000 + offset_in_section. Without them the handler no-ops -> a
    # downstream computed jump lands on a raw GB-space address (e.g. the
    # 0x3FFF98C1 abort).
    0x81100C84,  # GB handler (runtime 0x8011EF84, off 0xC84)
    0x811184F4,  # GB handler (runtime 0x801367F4, off 0x184F4)
    0x81118978,  # GB handler (runtime 0x80136C78, off 0x18978)
